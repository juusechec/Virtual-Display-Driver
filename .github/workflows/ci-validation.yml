# Triggering CI
name: CI Validation

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        run: choco install windowsdriverkit11 -y

      - name: SDK detection and Environment setup
        shell: pwsh
        run: |
          $regKey = "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots"
          $kitsRoot = (Get-ItemProperty -Path $regKey -Name "KitsRoot10" -ErrorAction SilentlyContinue).KitsRoot10
          if (-not $kitsRoot) {
            $kitsRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          }
          
          $includePath = Join-Path $kitsRoot "Include"
          $sdkDirs = Get-ChildItem -Path $includePath -Directory | Where-Object { $_.Name -match "^10\." } | Sort-Object { [version]$_.Name } -Descending
          
          # 1. Detect highest complete SDK for Windows.h
          $sdkVersion = ""
          foreach ($dir in $sdkDirs) {
            if (Test-Path (Join-Path $dir.FullName "um\Windows.h")) {
              $sdkVersion = $dir.Name
              break
            }
          }
          
          if (-not $sdkVersion) {
            Write-Error "No valid Windows SDK found."
            exit 1
          }
          Write-Output "Selected SDK Version: $sdkVersion"
          echo "SDK_VERSION=$sdkVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

          # 2. Detect UMDF version
          $umdf2PathVersioned = Join-Path $includePath "$sdkVersion\wdf\umdf"
          $umdf2PathUnversioned = Join-Path $includePath "wdf\umdf"
          $umdfDirs = @()
          if (Test-Path $umdf2PathVersioned) { $umdfDirs += Get-ChildItem -Path $umdf2PathVersioned -Directory | Where-Object { $_.Name -match "^2\." } }
          if (Test-Path $umdf2PathUnversioned) { $umdfDirs += Get-ChildItem -Path $umdf2PathUnversioned -Directory | Where-Object { $_.Name -match "^2\." } }
          $highestUmdf = $umdfDirs | Sort-Object { [version]$_.Name } -Descending | Select-Object -First 1
          if ($highestUmdf) {
            $umdfMinor = $highestUmdf.Name.Split('.')[1]
            Write-Output "UMDF_VERSION_MINOR=$umdfMinor"
            echo "UMDF_VERSION_MINOR=$umdfMinor" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

          # 3. Find IddCx headers and libs
          $iddcxHeader = Get-ChildItem -Path "$kitsRoot\Include" -Filter "IddCx.h" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($iddcxHeader) {
            $iddcxIncDir = Split-Path $iddcxHeader.FullName -Parent
            Write-Output "Found IddCx.h in: $iddcxIncDir"
            echo "EXTERNAL_INCLUDE=$iddcxIncDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

          $iddcxLib = Get-ChildItem -Path "$kitsRoot\Lib" -Filter "IddCx.lib" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if ($iddcxLib) {
            $iddcxLibDir = Split-Path $iddcxLib.FullName -Parent
            Write-Output "Found IddCx.lib in: $iddcxLibDir"
            echo "EXTERNAL_LIB=$iddcxLibDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build Driver
        shell: pwsh
        run: |
          if ($env:EXTERNAL_INCLUDE) { $env:INCLUDE = "$env:EXTERNAL_INCLUDE;$env:INCLUDE" }
          if ($env:EXTERNAL_LIB) { $env:LIB = "$env:EXTERNAL_LIB;$env:LIB" }
          
          msbuild "Virtual Display Driver (HDR)/MttVDD.sln" /m /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:WindowsTargetPlatformVersion=${{ env.SDK_VERSION }} /p:UMDF_VERSION_MINOR=${{ env.UMDF_VERSION_MINOR }} /p:EnableInfVerif=false /p:RunApiValidator=false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VDD-${{ matrix.platform }}-Release
          path: |
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/MttVDD/**
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.sys
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.inf
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.cat
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.cer
