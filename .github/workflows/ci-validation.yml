# Triggering CI
name: CI Validation

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        run: choco install windowsdriverkit11 -y

      - name: SDK detection and UMDF version
        shell: pwsh
        run: |
          $regKey = "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots"
          $kitsRoot = (Get-ItemProperty -Path $regKey -Name "KitsRoot10" -ErrorAction SilentlyContinue).KitsRoot10
          if (-not $kitsRoot) {
            $kitsRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          }
          
          $includePath = Join-Path $kitsRoot "Include"
          $sdkDirs = Get-ChildItem -Path $includePath -Directory | Where-Object { $_.Name -match "^10\." } | Sort-Object { [version]$_.Name } -Descending
          
          $sdkVersion = ""
          $iddcxMinor = ""
          foreach ($dir in $sdkDirs) {
            $iddcxBase = Join-Path $dir.FullName "um\iddcx"
            if (Test-Path $iddcxBase) {
              $sdkVersion = $dir.Name
              # Find highest IddCx version subfolder (e.g., "1.10", "1.4", "1.0")
              $versions = Get-ChildItem -Path $iddcxBase -Directory | Where-Object { $_.Name -match "^1\." } | Sort-Object { [version]$_.Name } -Descending
              if ($versions) {
                $iddcxMinor = $versions[0].Name.Split('.')[1]
                break
              }
            }
          }
          
          if (-not $sdkVersion) {
            Write-Warning "SDK with IddCx not found. Falling back to highest SDK."
            foreach ($dir in $sdkDirs) {
              $windowsH = Join-Path $dir.FullName "um\Windows.h"
              if (Test-Path $windowsH) {
                $sdkVersion = $dir.Name
                break
              }
            }
          }

          if (-not $sdkVersion) {
            Write-Error "Valid Windows SDK not found."
            exit 1
          }
          
          Write-Output "Selected SDK Version: $sdkVersion"
          echo "SDK_VERSION=$sdkVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

          if ($iddcxMinor) {
             Write-Output "Detected IddCx Version: 1.$iddcxMinor"
             echo "IDDCX_VERSION_MINOR=$iddcxMinor" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          
          $umdf2PathVersioned = Join-Path $includePath "$sdkVersion\wdf\umdf"
          $umdf2PathUnversioned = Join-Path $includePath "wdf\umdf"
          
          $umdfDirs = @()
          if (Test-Path $umdf2PathVersioned) {
             $umdfDirs += Get-ChildItem -Path $umdf2PathVersioned -Directory | Where-Object { $_.Name -match "^2\." }
          }
          if (Test-Path $umdf2PathUnversioned) {
             $umdfDirs += Get-ChildItem -Path $umdf2PathUnversioned -Directory | Where-Object { $_.Name -match "^2\." }
          }
          
          $highestUmdf = $umdfDirs | Sort-Object { [version]$_.Name } -Descending | Select-Object -First 1
          if (-not $highestUmdf) {
            Write-Error "UMDF 2.xx directory not found."
            exit 1
          }
          
          $umdfMinor = $highestUmdf.Name.Split('.')[1]
          Write-Output "UMDF_VERSION_MINOR=$umdfMinor"
          echo "UMDF_VERSION_MINOR=$umdfMinor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Driver
        run: |
          $iddcx_arg = ""
          if ($env:IDDCX_VERSION_MINOR) {
            $iddcx_arg = "/p:IDDCX_VERSION_MINOR=$env:IDDCX_VERSION_MINOR"
          }
          msbuild "Virtual Display Driver (HDR)/MttVDD.sln" /m /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:WindowsTargetPlatformVersion=${{ env.SDK_VERSION }} /p:UMDF_VERSION_MINOR=${{ env.UMDF_VERSION_MINOR }} $iddcx_arg /p:EnableInfVerif=false /p:RunApiValidator=false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VDD-${{ matrix.platform }}-Release
          path: |
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/MttVDD/**
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.sys
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.inf
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.cat
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.cer
