# Triggering CI
name: CI Validation

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        run: choco install windowsdriverkit11 -y

      - name: SDK detection and Environment setup
        shell: pwsh
        run: |
          $regKey = "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots"
          $kitsRoot = (Get-ItemProperty -Path $regKey -Name "KitsRoot10" -ErrorAction SilentlyContinue).KitsRoot10
          if (-not $kitsRoot) {
            $kitsRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          }
          
          $includePath = Join-Path $kitsRoot "Include"
          $sdkDirs = Get-ChildItem -Path $includePath -Directory | Where-Object { $_.Name -match "^10\." } | Sort-Object { [version]$_.Name } -Descending
          
          # 1. Detect highest complete SDK for Windows.h
          $sdkVersion = ""
          foreach ($dir in $sdkDirs) {
            if (Test-Path (Join-Path $dir.FullName "um\Windows.h")) {
              $sdkVersion = $dir.Name
              break
            }
          }
          
          if (-not $sdkVersion) {
            Write-Error "No valid Windows SDK found."
            exit 1
          }
          Write-Output "Selected SDK Version: $sdkVersion"
          echo "SDK_VERSION=$sdkVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

          # 2. Fix IddCx paths (HACK for runner environment)
          $targetIddCxDir = "$includePath\$sdkVersion\um\iddcx\1.10"
          if (-not (Test-Path $targetIddCxDir)) {
            $sourceIddCx = Get-ChildItem -Path "$kitsRoot\Include" -Filter "IddCx.h" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($sourceIddCx) {
              $sourceDir = Split-Path $sourceIddCx.FullName -Parent
              Write-Output "Copying IddCx headers from $sourceDir to $targetIddCxDir"
              New-Item -ItemType Directory -Force -Path $targetIddCxDir
              Copy-Item -Path "$sourceDir\*" -Destination $targetIddCxDir -Recurse -Force
            }
          }
          
          $targetIddCxLibDir = "$kitsRoot\Lib\$sdkVersion\um\x64"
          $sourceIddCxLib = Get-ChildItem -Path "$kitsRoot\Lib" -Filter "IddCx.lib" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if ($sourceIddCxLib -and (Test-Path $targetIddCxLibDir)) {
             $sourceLibDir = Split-Path $sourceIddCxLib.FullName -Parent
             if ($sourceLibDir -ne $targetIddCxLibDir) {
                Write-Output "Copying IddCx.lib from $sourceLibDir to $targetIddCxLibDir"
                Copy-Item -Path "$sourceLibDir\IddCx.lib" -Destination $targetIddCxLibDir -Force
             }
          }

          # 3. Detect UMDF version
          $umdf2PathVersioned = Join-Path $includePath "$sdkVersion\wdf\umdf"
          $umdf2PathUnversioned = Join-Path $includePath "wdf\umdf"
          $umdfDirs = @()
          if (Test-Path $umdf2PathVersioned) { $umdfDirs += Get-ChildItem -Path $umdf2PathVersioned -Directory | Where-Object { $_.Name -match "^2\." } }
          if (Test-Path $umdf2PathUnversioned) { $umdfDirs += Get-ChildItem -Path $umdf2PathUnversioned -Directory | Where-Object { $_.Name -match "^2\." } }
          $highestUmdf = $umdfDirs | Sort-Object { [version]$_.Name } -Descending | Select-Object -First 1
          if ($highestUmdf) {
            $umdfMinor = $highestUmdf.Name.Split('.')[1]
            Write-Output "UMDF_VERSION_MINOR=$umdfMinor"
            echo "UMDF_VERSION_MINOR=$umdfMinor" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build Driver
        run: msbuild "Virtual Display Driver (HDR)/MttVDD.sln" /m /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:WindowsTargetPlatformVersion=${{ env.SDK_VERSION }} /p:UMDF_VERSION_MINOR=${{ env.UMDF_VERSION_MINOR }} /p:EnableInfVerif=false /p:RunApiValidator=false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VDD-${{ matrix.platform }}-Release
          path: |
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/MttVDD/**
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.sys
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.inf
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.cat
            Virtual Display Driver (HDR)/${{ matrix.platform }}/Release/*.cer
